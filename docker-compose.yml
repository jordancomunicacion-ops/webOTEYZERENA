name: "sotooteyzerena"

networks:
  proxy-net:
    external: true

services:
  sotooteyzerena-web:
    build: .
    container_name: sotooteyzerena-web
    restart: unless-stopped
    networks:
      - proxy-net
    expose:
      - "3000"
    labels:
      - "traefik.enable=true"
      # Router HTTPS
      - "traefik.http.routers.sotooteyzerena-web.rule=Host(`oteyzerena.com`) || Host(`www.oteyzerena.com`)"
      - "traefik.http.routers.sotooteyzerena-web.entrypoints=websecure"
      - "traefik.http.routers.sotooteyzerena-web.tls=true"
      - "traefik.http.routers.sotooteyzerena-web.tls.certresolver=le"
      # Servicio
      - "traefik.http.services.sotooteyzerena-web.loadbalancer.server.port=3000"
      # Redirect HTTP -> HTTPS
      - "traefik.http.routers.sotooteyzerena-web-http.rule=Host(`oteyzerena.com`) || Host(`www.oteyzerena.com`)"
      - "traefik.http.routers.sotooteyzerena-web-http.entrypoints=web"
      - "traefik.http.routers.sotooteyzerena-web-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
